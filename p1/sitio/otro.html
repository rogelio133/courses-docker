<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>133</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --red: #c0000a;
      --darkred: #6b0004;
      --black: #050505;
      --offwhite: #d4c9b0;
      --gray: #1a1a1a;
      --metal: #3a3a3a;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--black);
      color: var(--offwhite);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
      cursor: crosshair;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ─── HERO ─── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--black);
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, #1a0000 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, #2a0000 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 10%, #1a0000 0%, transparent 60%);
      animation: pulseRed 4s ease-in-out infinite alternate;
    }

    @keyframes pulseRed {
      from {
        opacity: 0.6;
      }

      to {
        opacity: 1;
      }
    }

    /* Diagonal stripes */
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-55deg,
          transparent,
          transparent 40px,
          rgba(192, 0, 10, 0.03) 40px,
          rgba(192, 0, 10, 0.03) 41px);
    }

    .star-of-nine {
      position: absolute;
      width: 480px;
      height: 480px;
      opacity: 0.07;
      animation: rotateStar 30s linear infinite;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
    }

    @keyframes rotateStar {
      from {
        transform: translate(-50%, -55%) rotate(0deg);
      }

      to {
        transform: translate(-50%, -55%) rotate(360deg);
      }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .hero-eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      color: var(--red);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      animation: fadeDown 1s ease both;
    }

    .hero-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(5rem, 16vw, 14rem);
      line-height: 0.88;
      text-transform: uppercase;
      color: var(--offwhite);
      text-shadow:
        0 0 80px rgba(192, 0, 10, 0.5),
        0 0 160px rgba(192, 0, 10, 0.2);
      animation: fadeDown 1s 0.2s ease both;
      letter-spacing: -0.02em;
    }

    .hero-title span {
      color: var(--red);
      display: block;
    }

    .hero-subtitle {
      font-size: clamp(0.7rem, 1.5vw, 0.95rem);
      letter-spacing: 0.35em;
      color: var(--metal);
      text-transform: uppercase;
      margin-top: 2rem;
      animation: fadeDown 1s 0.4s ease both;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--metal);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(8px);
      }
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── DIVIDER ─── */
    .divider {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    /* ─── GALLERY ─── */
    .section {
      padding: 6rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--darkred);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: auto;
      gap: 12px;
    }

    .gallery-item {
      overflow: hidden;
      position: relative;
      background: var(--gray);
    }

    .gallery-item:nth-child(1) {
      grid-column: 1 / 6;
      grid-row: 1 / 3;
    }

    .gallery-item:nth-child(2) {
      grid-column: 6 / 9;
      grid-row: 1;
    }

    .gallery-item:nth-child(3) {
      grid-column: 9 / 13;
      grid-row: 1;
    }

    .gallery-item:nth-child(4) {
      grid-column: 6 / 10;
      grid-row: 2;
    }

    .gallery-item:nth-child(5) {
      grid-column: 10 / 13;
      grid-row: 2;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(60%) contrast(1.1);
      transition: filter 0.4s ease, transform 0.5s ease;
      min-height: 200px;
    }

    .gallery-item:hover img {
      filter: grayscale(0%) contrast(1.2);
      transform: scale(1.04);
    }

    .gallery-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(192, 0, 10, 0.1), transparent);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .gallery-item:hover::after {
      opacity: 1;
    }

    /* ─── SOCIAL LINKS ─── */
    .socials-section {
      padding: 6rem 2rem;
      background: var(--gray);
      position: relative;
      overflow: hidden;
    }

    .socials-section::before {
      content: 'MAGGOTS';
      position: absolute;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 18rem;
      color: rgba(192, 0, 10, 0.04);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: -0.05em;
    }

    .socials-inner {
      max-width: 900px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .socials-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      text-transform: uppercase;
      color: var(--offwhite);
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .socials-desc {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      color: var(--metal);
      text-transform: uppercase;
      margin-bottom: 4rem;
    }

    .social-links {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.8rem 2rem;
      background: var(--black);
      text-decoration: none;
      color: var(--offwhite);
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
      border-left: 3px solid transparent;
    }

    .social-link::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 100%;
      background: var(--red);
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 0;
    }

    .social-link:hover::before {
      width: 100%;
    }

    .social-link:hover {
      color: var(--black);
      border-left-color: var(--darkred);
    }

    .social-link-left,
    .social-link-right {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .social-icon {
      width: 44px;
      height: 44px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .social-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .social-handle {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      opacity: 0.5;
      text-transform: uppercase;
    }

    .social-arrow {
      font-size: 1.5rem;
      transition: transform 0.3s;
    }

    .social-link:hover .social-arrow {
      transform: translateX(6px);
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      color: var(--metal);
      text-transform: uppercase;
      border-top: 1px solid #111;
    }

    footer span {
      color: var(--red);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: 1fr 1fr;
      }

      .gallery-item:nth-child(1) {
        grid-column: 1 / 3;
        grid-row: 1;
      }

      .gallery-item:nth-child(2) {
        grid-column: 1;
        grid-row: 2;
      }

      .gallery-item:nth-child(3) {
        grid-column: 2;
        grid-row: 2;
      }

      .gallery-item:nth-child(4) {
        grid-column: 1;
        grid-row: 3;
      }

      .gallery-item:nth-child(5) {
        grid-column: 2;
        grid-row: 3;
      }

      .social-link {
        padding: 1.4rem 1.2rem;
      }
    }
  </style>
</head>

<body>

  <!-- ─── HERO ─── -->
  <section class="hero">
    <div class="hero-bg"></div>

    <!-- Nonagram SVG (nine-pointed star — Slipknot symbol) -->
    <svg class="star-of-nine" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

        <div class="gallery-item">

  </div>

  <div class="divider"></div>

        <!-- X / Twitter -->

            <!-- X icon -->

  </section>

  <!-- ─── FOOTER ─── -->

    <p>© 2026 &nbsp;<span>Slipknot</span>&nbsp; — All rights reserved &nbsp;|&nbsp; Des Moines, Iowa</p>
  </footer>

</body>
